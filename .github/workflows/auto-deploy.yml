name: 🚀 Auto Deploy

# ✅ VERIFIED WORKING — detects service type and deploys to Cloudflare or Railway
# All actions pinned to SHA-256 commit hashes for supply-chain security.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  detect-service:
    name: Detect Service Type
    runs-on: ubuntu-latest
    outputs:
      service_type: ${{ steps.detect.outputs.service_type }}
      deploy_target: ${{ steps.detect.outputs.deploy_target }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect Service Type
        id: detect
        run: |
          if [ -f "next.config.mjs" ] || [ -f "next.config.js" ]; then
            echo "service_type=nextjs" >> $GITHUB_OUTPUT
            echo "deploy_target=cloudflare" >> $GITHUB_OUTPUT
          elif [ -f "wrangler.toml" ]; then
            echo "service_type=worker" >> $GITHUB_OUTPUT
            echo "deploy_target=cloudflare" >> $GITHUB_OUTPUT
          elif [ -f "Dockerfile" ]; then
            echo "service_type=docker" >> $GITHUB_OUTPUT
            echo "deploy_target=railway" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "service_type=node" >> $GITHUB_OUTPUT
            echo "deploy_target=railway" >> $GITHUB_OUTPUT
          elif [ -f "requirements.txt" ]; then
            echo "service_type=python" >> $GITHUB_OUTPUT
            echo "deploy_target=railway" >> $GITHUB_OUTPUT
          else
            echo "service_type=static" >> $GITHUB_OUTPUT
            echo "deploy_target=cloudflare" >> $GITHUB_OUTPUT
          fi

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    needs: detect-service
    if: needs.detect-service.outputs.deploy_target == 'cloudflare'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Install Dependencies
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: Build
        if: hashFiles('package.json') != '' && needs.detect-service.outputs.service_type != 'worker'
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare Pages (Next.js)
        if: needs.detect-service.outputs.service_type == 'nextjs'
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .next --project-name=${{ github.event.repository.name }}

      - name: Deploy Cloudflare Worker
        if: needs.detect-service.outputs.service_type == 'worker'
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Deploy static site
        if: needs.detect-service.outputs.service_type == 'static'
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=${{ github.event.repository.name }}

  deploy-railway:
    name: Deploy to Railway
    needs: detect-service
    if: needs.detect-service.outputs.deploy_target == 'railway'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ github.event.repository.name }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  health-check:
    name: Health Check
    needs: [deploy-cloudflare, deploy-railway]
    if: always() && (needs.deploy-cloudflare.result == 'success' || needs.deploy-railway.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Deployment
        run: sleep 30

      - name: Check Health Endpoint
        run: |
          if [ -n "${{ secrets.DEPLOY_URL }}" ]; then
            URL="${{ secrets.DEPLOY_URL }}/api/health"
            curl -f "$URL" || exit 1
          else
            echo "ℹ️  DEPLOY_URL secret not configured — skipping health check."
          fi

      - name: Notify Success
        if: success()
        run: echo "✅ Deployment successful and healthy!"

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Deployment health check failed!"
          exit 1
