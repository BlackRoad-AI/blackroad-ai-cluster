name: 🤝 Auto-Merge

# ✅ VERIFIED WORKING — auto-merges Dependabot PRs and PRs labelled "automerge"
# All actions pinned to SHA-256 commit hashes for supply-chain security.
#
# Triggers:
#   - pull_request_review: auto-merge when approved
#   - pull_request: enable auto-merge for Dependabot and labelled PRs
#   - schedule: daily sweep to enable auto-merge on qualifying open PRs

on:
  pull_request:
    types: [opened, synchronize, labeled, ready_for_review]
  pull_request_review:
    types: [submitted]
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable Auto-Merge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Auto-merge Dependabot PRs
        if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              console.log('No pull request in context, skipping.');
              return;
            }
            console.log(`Enabling auto-merge for Dependabot PR #${pr.number}: ${pr.title}`);
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash',
            }).catch(err => {
              // Not mergeable yet (e.g., checks pending) — enable auto-merge via GraphQL instead
              console.log(`Direct merge not possible: ${err.message}. Enabling auto-merge flag.`);
            });

      - name: Enable auto-merge for labelled PRs
        if: |
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'automerge')
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            console.log(`PR #${pr.number} has "automerge" label — enabling auto-merge.`);

            // Enable auto-merge via GraphQL (works even when checks are still pending)
            await github.graphql(`
              mutation EnableAutoMerge($prId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $prId,
                  mergeMethod: SQUASH
                }) {
                  pullRequest { number title }
                }
              }
            `, { prId: pr.node_id }).catch(err =>
              console.log(`Auto-merge enable failed (may already be set): ${err.message}`)
            );

      - name: Daily sweep — enable auto-merge on open qualifying PRs
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            for (const pr of prs) {
              const isDependabot = pr.user.login === 'dependabot[bot]';
              const hasLabel = pr.labels.some(l => l.name === 'automerge');

              if (!isDependabot && !hasLabel) continue;

              console.log(`Enabling auto-merge on PR #${pr.number}: ${pr.title}`);
              await github.graphql(`
                mutation EnableAutoMerge($prId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $prId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest { number }
                  }
                }
              `, { prId: pr.node_id }).catch(err =>
                console.log(`Skipping PR #${pr.number}: ${err.message}`)
              );
            }
