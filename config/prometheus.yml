global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: blackroad-gateway
    static_configs:
      - targets: ['gateway:8787']
    metrics_path: /v1/metrics

  - job_name: blackroad-memory
    static_configs:
      - targets: ['memory-bridge:8002']
    metrics_path: /metrics

  - job_name: ollama
    static_configs:
      - targets: ['ollama:11434']
    metrics_path: /metrics
