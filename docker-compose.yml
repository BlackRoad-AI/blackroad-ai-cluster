# BlackRoad AI Cluster — Docker Compose
# Runs Ollama + vLLM + API gateway for local inference

version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: blackroad-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  ollama-init:
    image: ollama/ollama:latest
    container_name: blackroad-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull qwen2.5:7b
        ollama pull deepseek-r1:7b
        ollama pull llama3.2:3b
        echo "Models ready"
    restart: "no"

  gateway:
    image: node:20-alpine
    container_name: blackroad-gateway
    working_dir: /app
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - ./gateway:/app
    command: ["node", "server.js"]
    environment:
      - PORT=8787
      - BIND=0.0.0.0
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    image: node:20-alpine
    container_name: blackroad-api-gateway
    working_dir: /app
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./api-gateway:/app
    command: ["node", "index.js"]
    environment:
      - PORT=8001
      - GATEWAY_URL=http://gateway:8787
    depends_on:
      - gateway

  memory-bridge:
    image: python:3.12-slim
    container_name: blackroad-memory-bridge
    working_dir: /app
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ./memory-bridge:/app
      - memory-data:/data
    command: ["python", "-m", "uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8002"]
    environment:
      - DATA_DIR=/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: blackroad-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: blackroad-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=blackroad

volumes:
  ollama-models:
  memory-data:
  prometheus-data:
  grafana-data:
